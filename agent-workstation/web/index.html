<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Workstation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/xterm.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Agent Workstation</h1>
    <div class="topbar-actions">
      <span id="health">Checking...</span>
      <button id="logout-button" class="small-button" hidden>Log Out</button>
    </div>
  </header>
  <main class="layout">
    <nav class="sidebar" aria-label="Sections">
      <div class="nav-group">
        <div class="nav-heading">Dashboard</div>
        <button class="active" data-section="overview">Overview</button>
        <button data-section="updates">Updates</button>
      </div>
      <div class="nav-group">
        <div class="nav-heading">Workstation</div>
        <button data-section="files">Files</button>
        <button data-section="projects">Projects</button>
        <button data-section="terminal">Terminal</button>
      </div>
      <div class="nav-group">
        <div class="nav-heading">System</div>
        <button data-section="accounts">Accounts</button>
        <button data-section="logs">Logs</button>
        <button data-section="network">Network</button>
        <button data-section="services">Services</button>
      </div>
      <div class="nav-group">
        <div class="nav-heading">Agents</div>
        <button data-section="configs">Agent Configs</button>
        <button data-section="oculus">oculus-configs</button>
      </div>
      <div class="nav-group">
        <div class="nav-heading">Preferences</div>
        <button data-section="settings">Settings</button>
      </div>
    </nav>
    <section class="content">
      <form id="login-panel" class="panel login-panel" hidden>
        <h2>Sign In</h2>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username">
        <label for="password">Password</label>
        <div class="login-row">
          <input id="password" name="password" type="password" autocomplete="current-password">
          <button type="submit">Sign In</button>
        </div>
        <p id="login-error" class="error-text"></p>
      </form>
      <div class="content-heading">
        <h2 id="section-title">Overview</h2>
        <button id="refresh-button" class="small-button" hidden>Refresh</button>
      </div>
      <div id="section-body" class="panel">Loading system overview...</div>
    </section>
  </main>
  <script src="/vendor/xterm.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
