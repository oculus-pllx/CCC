<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Workstation</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Agent Workstation</h1>
    <div class="topbar-actions">
      <span id="health">Checking...</span>
      <button id="logout-button" class="small-button" hidden>Log Out</button>
    </div>
  </header>
  <main class="layout">
    <nav class="sidebar" aria-label="Sections">
      <button class="active">Overview</button>
      <button>Logs</button>
      <button>Network</button>
      <button>Accounts</button>
      <button>Services</button>
      <button>Files</button>
      <button>Updates</button>
      <button>Terminal</button>
      <button>Projects</button>
      <button>oculus-configs</button>
    </nav>
    <section class="content">
      <form id="login-panel" class="panel login-panel" hidden>
        <h2>Sign In</h2>
        <label for="password">Password</label>
        <div class="login-row">
          <input id="password" name="password" type="password" autocomplete="current-password">
          <button type="submit">Sign In</button>
        </div>
        <p id="login-error" class="error-text"></p>
      </form>
      <h2>Overview</h2>
      <div id="overview" class="panel">Loading system overview...</div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
