<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Container Code Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/xterm.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="signed-out">
  <main id="login-shell" class="login-shell">
    <section class="login-card" aria-label="Container Code Companion sign in">
      <a class="login-brand-lockup" href="https://pllx.group" target="_blank" rel="noopener" aria-label="Container Code Companion by Parallax Group">
        <svg class="login-brand-mark" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <line x1="11.2" y1="16.8" x2="20.8" y2="13.6" stroke="currentColor" stroke-opacity="0.15" stroke-width="1.44" stroke-dasharray="2.8 2.8"/>
          <line x1="11.2" y1="47.2" x2="20.8" y2="50.4" stroke="currentColor" stroke-opacity="0.15" stroke-width="1.44" stroke-dasharray="2.8 2.8"/>
          <line x1="32" y1="32" x2="44.8" y2="32" stroke="currentColor" stroke-opacity="0.15" stroke-width="1.44" stroke-dasharray="2.8 2.8"/>
          <polyline points="11.2,16.8 32,32 11.2,47.2" stroke="currentColor" stroke-opacity="0.30" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="20.8,13.6 44.8,32 20.8,50.4" stroke="currentColor" stroke-opacity="0.90" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="login-brand-text">
          <strong>C.C.C</strong>
          <span>by Parallax Group</span>
        </span>
      </a>
      <form id="login-panel" class="login-panel">
        <h1>Container Code Companion</h1>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username">
        <label for="password">Password</label>
        <div class="login-row">
          <input id="password" name="password" type="password" autocomplete="current-password">
          <button type="submit">Sign In</button>
        </div>
        <p id="login-error" class="error-text"></p>
      </form>
    </section>
  </main>
  <div id="app-shell" class="app-shell" hidden>
    <header class="topbar">
      <a class="brand-lockup" href="https://pllx.group" target="_blank" rel="noopener" aria-label="Container Code Companion by Parallax Group">
      <svg class="brand-mark" viewBox="0 0 64 64" fill="none" aria-hidden="true">
        <line x1="11.2" y1="16.8" x2="20.8" y2="13.6" stroke="currentColor" stroke-opacity="0.15" stroke-width="1.44" stroke-dasharray="2.8 2.8"/>
        <line x1="11.2" y1="47.2" x2="20.8" y2="50.4" stroke="currentColor" stroke-opacity="0.15" stroke-width="1.44" stroke-dasharray="2.8 2.8"/>
        <line x1="32" y1="32" x2="44.8" y2="32" stroke="currentColor" stroke-opacity="0.15" stroke-width="1.44" stroke-dasharray="2.8 2.8"/>
        <polyline points="11.2,16.8 32,32 11.2,47.2" stroke="currentColor" stroke-opacity="0.30" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="20.8,13.6 44.8,32 20.8,50.4" stroke="currentColor" stroke-opacity="0.90" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-text">
        <strong>C.C.C</strong>
        <span>by Parallax Group</span>
      </span>
    </a>
    <button id="top-update-alert" class="top-update-alert" type="button" data-nav-updates hidden></button>
    <div class="topbar-actions">
      <span id="health">Checking...</span>
      <button id="mobile-menu-button" class="mobile-menu-button" type="button" aria-label="Open navigation menu" aria-controls="mobile-sidebar" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <button id="top-preferences-button" class="small-button">Preferences</button>
      <button id="logout-button" class="small-button" hidden>Log Out</button>
    </div>
    </header>
    <main class="layout">
    <div id="mobile-nav-overlay" class="mobile-nav-overlay" hidden></div>
    <nav id="mobile-sidebar" class="sidebar" aria-label="Sections">
      <div class="nav-group">
        <div class="nav-heading">Dashboard</div>
        <button class="active" data-section="overview">Overview</button>
        <button data-section="updates">Updates</button>
      </div>
      <div class="nav-group">
        <div class="nav-heading">Workstation</div>
        <button data-section="apps">App Catalog</button>
        <button data-section="files">Files</button>
        <button data-section="drives">Map Drives</button>
        <button data-section="notes">Notes</button>
        <button data-section="projects">Projects</button>
        <button data-section="terminal">Terminal</button>
      </div>
      <div class="nav-group">
        <div class="nav-heading">System</div>
        <button data-section="accounts">Accounts</button>
        <button data-section="logs">Logs</button>
        <button data-section="network">Network</button>
        <button data-section="services">Services</button>
      </div>
      <div class="nav-group">
        <div class="nav-heading">Settings</div>
        <button data-section="github">GitHub</button>
        <button data-section="ssh-keys">SSH Key Inventory</button>
        <button data-section="oculus">oculus-configs</button>
        <button data-section="chronicle">Claude Chronicle</button>
        <button data-section="settings">Preferences</button>
        <button data-section="configs">Provider Configs</button>
      </div>
    </nav>
    <section class="content">
      <div class="content-heading">
        <h2 id="section-title">Overview</h2>
        <button id="refresh-button" class="small-button" hidden>Refresh</button>
      </div>
      <div class="custom-title-row">
        <div id="custom-title-display" class="custom-title-display">Container Code Companion</div>
        <button id="custom-title-edit" class="small-button" type="button">Edit</button>
      </div>
      <div id="section-body" class="panel">Loading system overview...</div>
      <div id="terminal-container" class="panel" hidden></div>
    </section>
    </main>
    <div id="ssh-deploy-modal" class="modal-backdrop" hidden>
      <div class="modal-box">
        <h3>Deploy SSH Key</h3>
        <p id="ssh-deploy-modal-desc"></p>
        <label for="ssh-deploy-password">Root password for test machine</label>
        <input id="ssh-deploy-password" type="password" autocomplete="off">
        <p id="ssh-deploy-modal-error" class="error-text" hidden></p>
        <div class="modal-actions">
          <button id="ssh-deploy-modal-cancel" class="small-button">Cancel</button>
          <button id="ssh-deploy-modal-submit" class="small-button">Deploy Key</button>
        </div>
      </div>
    </div>
  </div>
  <footer class="app-footer">
    <a class="footer-brand" href="https://pllx.group" target="_blank" rel="noopener">
      <span>C.C.C</span>
      <small>by Parallax Group</small>
    </a>
    <span>&copy; 2026 Parallax Group</span>
    <span>MIT License</span>
    <a href="https://pllx.group" target="_blank" rel="noopener">pllx.group</a>
  </footer>
  <script src="/vendor/xterm.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
